```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL PRODUCTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { position: fixed; z-index: 0; }
        
        .container { position: relative; z-index: 1; text-align: center; width: 90%; max-width: 600px; }
        .brand { font-size: 2.5rem; font-weight: 200; letter-spacing: 0.2em; margin-bottom: 80px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { 
            padding: 30px; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .card:hover { border-color: #fff; background: #111; }
        .card h2 { font-size: 0.9rem; font-weight: 400; margin: 0; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="container">
        <div class="brand">DIGITAL PRODUCTS</div>
        <div class="grid">
            <div class="card" onclick="verifyAccess('./catalog1/')">
                <h2>CATALOG 01</h2>
            </div>
            <div class="card" onclick="verifyAccess('./catalog2/')">
                <h2>CATALOG 02</h2>
            </div>
        </div>
    </div>

    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        
        function verifyAccess(path) {
            // This confirm() dialog will trigger normally when hosted on GitHub Pages
            if (confirm("Support the project by liking this repository to unlock access.")) {
                window.location.href = path;
            }
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,c.width,c.height);
            ctx.strokeStyle = '#111';
            for(let i=0; i<c.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,c.height); ctx.stroke(); }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
