<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL PRODUCTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');
        
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { position: fixed; z-index: 0; }
        
        .container { position: relative; z-index: 1; text-align: center; width: 90%; max-width: 600px; }
        .brand { font-size: 2.5rem; font-weight: 200; letter-spacing: 0.2em; margin-bottom: 60px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { 
            padding: 30px; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { border-color: #fff; background: #111; }
        .card h2 { font-size: 0.9rem; font-weight: 400; margin: 0; letter-spacing: 0.1em; }
        .like-count { font-size: 0.7rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="container">
        <div class="brand">DIGITAL PRODUCTS</div>
        <div class="grid">
            <div class="card" onclick="verifyAccess('./catalog1/', 'likes1')">
                <h2>CATALOG 01</h2>
                <div class="like-count">LIKES: <span id="likes1">0</span></div>
            </div>
            <div class="card" onclick="verifyAccess('./catalog2/', 'likes2')">
                <h2>CATALOG 02</h2>
                <div class="like-count">LIKES: <span id="likes2">0</span></div>
            </div>
        </div>
    </div>

    <script>
        function updateDisplay() {
            document.getElementById('likes1').innerText = localStorage.getItem('likes1') || 0;
            document.getElementById('likes2').innerText = localStorage.getItem('likes2') || 0;
        }
        updateDisplay();

        function verifyAccess(path, storageKey) {
            if (confirm("Support the project by liking this repository to unlock access.")) {
                // Increment the specific counter
                let current = parseInt(localStorage.getItem(storageKey) || 0);
                localStorage.setItem(storageKey, current + 1);
                updateDisplay();
                
                // Proceed to the catalog
                window.location.href = path;
            }
        }

        const c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,c.width,c.height);
            ctx.strokeStyle = '#111';
            for(let i=0; i<c.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,c.height); ctx.stroke(); }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
